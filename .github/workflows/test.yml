name: Test & Validate Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies via uv
      run: |
        pip install uv
        uv pip install -e .
    
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check . || true
      continue-on-error: true
    
    - name: Type check with pyright
      run: |
        pip install pyright
        pyright . || true
      continue-on-error: true
    
    - name: Run tests
      run: |
        if [ -d tests ]; then
          pip install pytest pytest-cov
          pytest tests/ -v --cov=src
        else
          echo "No tests directory found - skipping"
        fi
      continue-on-error: true
    
    - name: Check for large files
      run: |
        echo "Checking for files > 100MB..."
        find . -type f -size +100M -not -path './.git/*' | head -20 || echo "No large files found"
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          .coverage
          htmlcov/
        retention-days: 30
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
      continue-on-error: true
    
    - name: Verify no hardcoded API keys
      run: |
        echo "Checking for exposed credentials..."
        grep -r "sk-or-v1\|OPENROUTER_API_KEY\|Bearer " --include="*.py" . || true
      continue-on-error: true

  documentation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check README exists
      run: |
        if [ ! -f README.md ]; then
          echo "⚠️ README.md not found"
          exit 1
        fi
        if [ ! -s README.md ] || [ $(wc -w < README.md) -lt 20 ]; then
          echo "⚠️ README.md is empty or too short"
          exit 1
        fi
    
    - name: Verify TASKS.md
      run: |
        if [ -f TASKS.md ]; then
          echo "✓ TASKS.md found"
          grep -c "^- \[" TASKS.md || echo "⚠️ No tasks found in TASKS.md"
        fi
      continue-on-error: true

  report:
    runs-on: ubuntu-latest
    needs: [test, security-scan, documentation]
    if: always()
    steps:
    - name: Test Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Test Status**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Security Scan**: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Documentation**: ${{ needs.documentation.result }}" >> $GITHUB_STEP_SUMMARY
