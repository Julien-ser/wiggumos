name: Build & Validate OS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm make qemu-system-x86 mtools gcc

    - name: Build kernel and userland
      run: |
        make all || true
      continue-on-error: true

    - name: Check build artifacts
      run: |
        if [ -f wiggumos.img ]; then
          echo "✓ Disk image created"
          ls -lh wiggumos.img
        else
          echo "⚠️ Disk image not found"
        fi

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
      continue-on-error: true
    - name: Verify no hardcoded API keys
      run: |
        echo "Checking for exposed credentials..."
        grep -r "sk-or-v1\|OPENROUTER_API_KEY\|Bearer " --include="*.c" --include="*.h" --include="*.asm" . || true
      continue-on-error: true

  documentation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check README exists
      run: |
        if [ ! -f README.md ]; then
          echo "⚠️ README.md not found"
          exit 1
        fi
        if [ ! -s README.md ] || [ $(wc -w < README.md) -lt 20 ]; then
          echo "⚠️ README.md is empty or too short"
          exit 1
        fi
    - name: Verify TASKS.md
      run: |
        if [ -f TASKS.md ]; then
          echo "✓ TASKS.md found"
          grep -c "^- \[" TASKS.md || echo "⚠️ No tasks found in TASKS.md"
        fi
      continue-on-error: true

  report:
    runs-on: ubuntu-latest
    needs: [build, security-scan, documentation]
    if: always()
    steps:
    - name: Build Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Status**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Security Scan**: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Documentation**: ${{ needs.documentation.result }}" >> $GITHUB_STEP_SUMMARY
